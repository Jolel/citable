default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    - queues: "reminders"
      threads: 2
      processes: 1
      polling_interval: 0.5
    - queues: "notifications"
      threads: 3
      processes: 1
      polling_interval: 0.5
    - queues: "default"
      threads: 3
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 0.1

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
  workers:
    - queues: "reminders"
      threads: 2
      processes: 2
      polling_interval: 0.5
    - queues: "notifications"
      threads: 5
      processes: 2
      polling_interval: 0.5
    - queues: "default"
      threads: 5
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 2) %>
      polling_interval: 0.1
